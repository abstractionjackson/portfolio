<template id="business-card">
  <header>
    <figure>
      <slot name="avatar">
        <img
          src="#"
          alt=""
        />
      </slot>
    </figure>
  </header>
  <main>
    <slot name="full_name">
      <span class="name_first">John</span>
      <span> </span>
      <span class="name_last">Doe</span>
    </slot>
    <slot name="github">
      <a href="http://github.com">@username</a>
    </slot>
    <slot name="company_name">
      <span hidden>Acme Co.</span>
    </slot>
    <slot name="job_title">
      <span class="job_title">Vice President</span>
    </slot>
  </main>
</template>
<script>
  customElements.define(
    'business-card',
    class extends HTMLElement {
      constructor() {
        super()

        const shadowRoot = this.attachShadow({ mode: 'open' })

        const linkCSS = document.createElement('link')
        linkCSS.rel = 'stylesheet'
        linkCSS.href = '{{ site.BaseURL }}css/business-card.css'
        this.shadowRoot.appendChild(linkCSS)

        const template = document.getElementById('business-card')
        const templateContent = template.content
        this.shadowRoot.appendChild(templateContent.cloneNode(true))
      }
    },
  )
</script>
